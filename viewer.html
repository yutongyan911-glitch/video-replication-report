<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni Evaluation - 参考点可视化</title>
    <style>
        :root {
            --bg-dark: #121318;
            --bg-sidebar: #1C1E26;
            --bg-card: #20222B;
            --text-main: #E2E4EB;
            --text-sub: #8B8D98;
            --accent-blue: #3E8BFF;
            --accent-green: #238636;
            --border-color: #2F323D;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* 侧边栏 */
        .sidebar {
            width: 250px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar-header h2 {
            margin: 0 0 5px 0;
            font-size: 16px;
            font-weight: 600;
        }

        .sidebar-header p {
            margin: 0;
            font-size: 12px;
            color: var(--text-sub);
        }

        .case-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .case-item {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 5px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .case-item:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        .case-item.active {
            background-color: rgba(62, 139, 255, 0.1);
            border-color: var(--accent-blue);
        }

        .case-info h3 {
            margin: 0 0 4px 0;
            font-size: 14px;
        }

        .case-info p {
            margin: 0;
            font-size: 12px;
            color: var(--text-sub);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 140px;
        }

        .badge-done {
            background-color: var(--accent-green);
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            font-weight: bold;
        }

        /* 主内容区 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .top-navbar {
            padding: 20px 30px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .top-navbar h1 {
            margin: 0;
            font-size: 20px;
        }

        .content-body {
            padding: 30px;
        }

        .section-title {
            font-size: 16px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }

        .section-title::before {
            content: "";
            display: inline-block;
            width: 4px;
            height: 16px;
            background-color: var(--accent-blue);
            margin-right: 8px;
            border-radius: 2px;
        }

        /* 素材网格 */
        .assets-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
        }

        .asset-card {
            background-color: var(--bg-card);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            width: 280px;
        }

        .asset-media {
            width: 100%;
            height: 280px;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .asset-media img,
        .asset-media video {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .asset-info {
            padding: 12px 15px;
        }

        .asset-type {
            font-size: 12px;
            color: var(--accent-blue);
            font-weight: bold;
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .asset-name {
            font-size: 13px;
            color: var(--text-sub);
            margin: 0;
        }

        /* 提示词模块 */
        .prompt-box {
            background-color: var(--bg-card);
            border-radius: 8px;
            padding: 15px 20px;
            margin-bottom: 30px;
            border: 1px solid var(--border-color);
            line-height: 1.6;
            font-size: 14px;
        }

        /* JSON 参考点展示 */
        .json-section {
            background-color: var(--bg-card);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .json-table {
            width: 100%;
            border-collapse: collapse;
        }

        .json-table th,
        .json-table td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
        }

        .json-table th {
            font-weight: 600;
            color: var(--text-sub);
            width: 20%;
        }

        .json-table td {
            line-height: 1.5;
        }

        .tag {
            display: inline-block;
            background-color: rgba(255, 255, 255, 0.1);
            padding: 2px 8px;
            border-radius: 4px;
            margin: 2px;
            font-size: 12px;
        }

        .tag.discard {
            background-color: rgba(255, 80, 80, 0.2);
            color: #ff8888;
        }

        .mapping-card {
            background-color: rgba(255, 255, 255, 0.03);
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid var(--border-color);
        }

        .mapping-title {
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--accent-blue);
        }

        ul {
            margin: 0;
            padding-left: 20px;
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <h2>Omni Evaluation</h2>
            <p id="total-count">总计 0 组评测方案</p>
        </div>
        <div class="case-list" id="case-list">
            <!-- 列表动态生成 -->
        </div>
    </div>

    <div class="main-content">
        <div class="top-navbar">
            <h1 id="top-title">请选择 Case</h1>
            <div id="top-meta" style="color: var(--text-sub); font-size: 14px;"></div>
        </div>

        <div class="content-body" id="content-body" style="display: none;">

            <div class="section-title">真实输入素材 (放大展示)</div>
            <div class="assets-grid" id="assets-grid">
                <!-- 素材动态生成 -->
            </div>

            <div class="section-title">生成指令 Prompt</div>
            <div class="prompt-box">
                <div style="margin-bottom: 15px;">
                    <strong style="color: var(--text-sub);">[中文]: </strong>
                    <span id="zh-prompt"></span>
                </div>
                <div>
                    <strong style="color: var(--text-sub);">[英文]: </strong>
                    <span id="en-prompt"></span>
                </div>
            </div>

            <div class="section-title">生成任务解读 &amp; 参考点提取 (Model Output)</div>
            <div class="json-section">
                <table class="json-table" id="json-table">
                    <!-- JSON 结果动态生成 -->
                </table>
            </div>

        </div>
    </div>

    <!-- 引入生成的数据 -->
    <script src="viewer_data.js"></script>

    <script>
        document.getElementById('total-count').innerText = `已解析 ${viewerData.length} 组案例`;

        const caseListEl = document.getElementById('case-list');
        const contentBodyEl = document.getElementById('content-body');

        // 定义需要置顶和标记 New 的 Case
        const priorityIds = ['效果广告爆款_041', '效果广告爆款_001', '效果广告爆款_002', '社媒特效爆款_041', '社媒特效爆款_042', '经典影视_101', '社媒特效爆款_061'];

        // 对数据进行排序：priorityIds 内的排在最前面
        viewerData.sort((a, b) => {
            const idxA = priorityIds.indexOf(a.id);
            const idxB = priorityIds.indexOf(b.id);
            if (idxA !== -1 && idxB !== -1) return idxA - idxB; // 如果都在列表里，按列表顺序
            if (idxA !== -1) return -1; // a 在列表里，b 不在，a 往前排
            if (idxB !== -1) return 1;  // b 在列表里，a 不在，b 往前排
            return 0; // 都不在列表里，保持原序
        });

        // 渲染左侧列表
        viewerData.forEach((data, index) => {
            const el = document.createElement('div');
            el.className = 'case-item';
            el.dataset.index = index;

            const stats = [];
            if (data.assets.video) stats.push('1 视频');
            stats.push(`${data.assets.images.length} 辅图`);
            const objs = Object.keys(data.assets.objects).length;
            if (objs > 0) stats.push(`${objs} 主体`);

            // 判断是否显示 New 标签
            const isNew = priorityIds.includes(data.id);
            const badgeText = isNew ? 'New' : 'Done';
            const badgeStyle = isNew ? 'background-color: #ff9900; color: white;' : '';

            el.innerHTML = `
                <div class="case-info">
                    <h3>${data.id}</h3>
                    <p>素材: ${stats.join(' | ')}</p>
                </div>
                <div class="badge-done" style="${badgeStyle}">${badgeText}</div>
            `;

            el.onclick = () => selectCase(index);
            caseListEl.appendChild(el);
        });

        function selectCase(index) {
            // 更新菜单活跃状态
            document.querySelectorAll('.case-item').forEach(el => el.classList.remove('active'));
            document.querySelector(`.case-item[data-index="${index}"]`).classList.add('active');

            const data = viewerData[index];
            contentBodyEl.style.display = 'block';

            // 顶栏
            document.getElementById('top-title').innerText = data.id;
            document.getElementById('top-meta').innerText = data.result.inferred_task_type ? `推断任务类型: ${data.result.inferred_task_type}` : "";

            // Prompt
            document.getElementById('zh-prompt').innerText = data.zh_prompt;
            document.getElementById('en-prompt').innerText = data.en_prompt;

            // 渲染素材
            const grid = document.getElementById('assets-grid');
            grid.innerHTML = '';
            
            // 清理旧的布局容器
            const oldLayout = document.getElementById('media-layout-container');
            if (oldLayout) oldLayout.remove();

            // 创建总容器 (垂直排列)
            const layoutContainer = document.createElement('div');
            layoutContainer.id = 'media-layout-container';
            layoutContainer.style.display = 'flex';
            layoutContainer.style.flexDirection = 'column';
            layoutContainer.style.gap = '10px';
            layoutContainer.style.marginBottom = '30px';

            // 第一行：参考视频 + 参考图片 (底部对齐)
            const row1 = document.createElement('div');
            row1.style.display = 'flex';
            row1.style.gap = '20px';
            row1.style.alignItems = 'flex-end'; // 底部对齐核心指令

            const videoStyle = "width:100%; max-height:280px; display:block; border-radius:4px; background:#000;";

            // Row 1 - Left: 参考视频
            if (data.assets.ref_video) {
                const refVideoCard = document.createElement('div');
                refVideoCard.className = 'asset-card';
                refVideoCard.style.width = '260px';
                refVideoCard.style.margin = '0';
                refVideoCard.innerHTML = `
                    <div class="asset-media" style="height:auto;">
                        <video src="${data.assets.ref_video}" controls muted style="${videoStyle}"></video>
                    </div>
                    <div class="asset-info" style="padding:4px 10px;">
                        <div class="asset-type" style="font-size:11px; color:#aaa;">📹 the video</div>
                    </div>
                `;
                row1.appendChild(refVideoCard);
            }

            // Row 1 - Right: 图片列表
            const imageGrid = document.createElement('div');
            imageGrid.className = 'assets-grid';
            imageGrid.style.display = 'flex';
            imageGrid.style.gap = '15px';
            imageGrid.style.flexWrap = 'wrap';
            imageGrid.style.marginBottom = '0';

            data.assets.images.forEach((img, i) => {
                imageGrid.innerHTML += `
                    <div class="asset-card" style="width:150px; flex-shrink:0; margin:0;">
                        <div class="asset-media">
                            <img src="${img}" style="width:100%; height:150px; object-fit:cover;">
                        </div>
                        <div class="asset-info" style="padding:6px;">
                            <div class="asset-type" style="font-size:11px; color:#aaa;">🖼 Image ${i+1}</div>
                        </div>
                    </div>
                `;
            });

            // 添加 Objects
            Object.keys(data.assets.objects).forEach(obj_name => {
                const imgs = data.assets.objects[obj_name];
                imageGrid.innerHTML += `
                    <div class="asset-card" style="width:150px; flex-shrink:0; margin:0;">
                        <div class="asset-media">
                            <img src="${imgs[0]}" style="width:100%; height:150px; object-fit:cover;">
                        </div>
                        <div class="asset-info" style="padding:6px;">
                            <div class="asset-type" style="font-size:11px; color:#aaa;">📦 ${obj_name}</div>
                        </div>
                    </div>
                `;
            });

            if (data.assets.images.length > 0 || Object.keys(data.assets.objects).length > 0) {
                row1.appendChild(imageGrid);
            }

            // 第二行：生成结果视频 (对齐 row1 的视频位)
            const row2 = document.createElement('div');
            row2.style.display = 'flex';
            row2.style.gap = '20px';

            if (data.assets.gen_video) {
                const genVideoCard = document.createElement('div');
                genVideoCard.className = 'asset-card';
                genVideoCard.style.width = '260px';
                genVideoCard.style.margin = '0';
                genVideoCard.style.borderColor = 'var(--accent-blue)';
                genVideoCard.style.background = 'rgba(62,139,255,0.05)';
                genVideoCard.innerHTML = `
                    <div class="asset-media" style="height:auto;">
                        <video src="${data.assets.gen_video}" controls muted style="${videoStyle}"></video>
                    </div>
                    <div class="asset-info" style="padding:4px 10px;">
                        <div class="asset-type" style="color: var(--accent-blue); font-size:11px;">✨ 生成结果</div>
                    </div>
                `;
                row2.appendChild(genVideoCard);
            }

            layoutContainer.appendChild(row1);
            layoutContainer.appendChild(row2);
            
            grid.parentElement.insertBefore(layoutContainer, grid);
            grid.style.display = 'none';

            // 渲染解析结果
            const tBody = document.getElementById('json-table');
            const res = data.result;

            let mappingHtml = '';
            if (res.reference_points && res.reference_points.assets_mapping) {
                res.reference_points.assets_mapping.forEach(mapping => {
                    const vl = mapping.visual_layer || mapping.video_layer || {};
                    const al = mapping.audio_layer || {};
                    
                    function formatPriority(text) {
                        return text.replace(/\[P0\]\s*/g, '<span style="color:#ff4757; font-weight:bold; padding: 2px 4px; background: rgba(255,71,87,0.1); border-radius: 4px; margin-right:4px; font-size:0.9em;">P0</span>')
                                   .replace(/\[P1\]\s*/g, '<span style="color:#1e90ff; font-weight:bold; padding: 2px 4px; background: rgba(30,144,255,0.1); border-radius: 4px; margin-right:4px; font-size:0.9em;">P1</span>');
                    }

                    // 动态遍历并渲染，尊重 JSON 中字段的先后顺序
                    const layerNames = {
                        entity_subject: "主体/实体",
                        visual_style: "视觉风格",
                        environment: "场景",
                        subject_actions: "主体动作",
                        camera_movement: "镜头运镜",
                        composition: "画面构图",
                        editing_techniques: "剪辑方式",
                        special_effects: "视觉特效",
                        presentation_format: "视频体裁",
                        dialogue_content: "台词内容",
                        dialogue_style: "台词风格",
                        music_exact: "原BGM",
                        music_genre: "音乐风格",
                        sound_effects: "音效",
                        ambient_sound: "环境音"
                    };

                    const vInfo = [];
                    Object.keys(vl).forEach(k => {
                        if (vl[k] && Array.isArray(vl[k]) && vl[k].length && !k.includes("...")) {
                            const itemsHtml = vl[k].map(t => formatPriority(t)).join('<br>');
                            vInfo.push(`<li><b>${layerNames[k] || k}</b>: <div style="margin-top:4px; padding-left:8px;">${itemsHtml}</div></li>`);
                        }
                    });

                    const aInfo = [];
                    Object.keys(al).forEach(k => {
                        if (al[k] && Array.isArray(al[k]) && al[k].length && !k.includes("...")) {
                            const itemsHtml = al[k].map(t => formatPriority(t)).join('<br>');
                            aInfo.push(`<li><b>${layerNames[k] || k}</b>: <div style="margin-top:4px; padding-left:8px;">${itemsHtml}</div></li>`);
                        }
                    });

                    if (vInfo.length || aInfo.length) {
                        mappingHtml += `<div class="mapping-card">
                            <div class="mapping-title">关联素材: ${mapping.asset_id}</div>
                            ${vInfo.length ? `<div>[视觉层]</div><ul>${vInfo.join('')}</ul>` : ''}
                            ${aInfo.length ? `<div style="margin-top:5px;">[音频层]</div><ul>${aInfo.join('')}</ul>` : ''}
                        </div>`;
                    }
                });
            }

            let discardHtml = '';
            if (res.discard_elements) {
                const dv = res.discard_elements.visual_layer_discards || res.discard_elements.video_layer_discards || [];
                const da = res.discard_elements.audio_layer_discards || [];
                dv.forEach(t => discardHtml += `<span class="tag discard">👁 ${t}</span>`);
                da.forEach(t => discardHtml += `<span class="tag discard">🎵 ${t}</span>`);
            }

            // 格式化评估内容的辅助函数
            const formatEvalText = (text) => {
                if (!text) return '-';
                return text.split('\n')
                    .map(line => line.trim())
                    .filter(line => line.length > 0)
                    .map(line => {
                        let style = "margin-bottom:8px; line-height:1.5; padding-left:24px; position:relative;";
                        let color = "inherit";
                        let icon = "";
                        
                        if (line.includes('✅')) {
                            color = "#2ecc71";
                            icon = '<span style="position:absolute; left:0;">✅</span>';
                            line = line.replace('✅', '').trim();
                        } else if (line.includes('❌')) {
                            color = "#e74c3c";
                            icon = '<span style="position:absolute; left:0;">❌</span>';
                            line = line.replace('❌', '').trim();
                        } else {
                            icon = '<span style="position:absolute; left:0; color:var(--text-sub);">•</span>';
                        }

                        return `<div style="${style} color:${color};">${icon}${line}</div>`;
                    }).join('');
            };

            let evalHtml = '<div style="color: var(--text-sub);">尚未进行 AI 评估</div>';
            const ev = data.evaluation;
            if (ev && Object.keys(ev).length > 0) {
                const qColor = ev.is_qualified ? "#238636" : "#ff4757";
                const qBg = ev.is_qualified ? "rgba(35, 134, 54, 0.1)" : "rgba(255, 71, 87, 0.1)";
                evalHtml = `
                    <div style="margin-bottom:15px; display:flex; flex-wrap:wrap; align-items:center; gap:15px; background:var(--bg-secondary); padding:12px; border-radius:8px;">
                        <div style="background: ${qBg}; color: ${qColor}; padding:6px 14px; border-radius:4px; font-weight:bold; border:1px solid ${qColor}; font-size:14px; min-width:110px; text-align:center;">
                            ${ev.is_qualified ? '✅ 合格 (PASS)' : '❌ 不合格 (FAIL)'}
                        </div>
                        <div style="font-size:14px; display:flex; gap:15px; flex-grow:1;">
                            <div>
                                <div style="color:var(--text-sub); font-size:11px; margin-bottom:2px;">评价总分 (Weighted)</div>
                                <span style="font-size:24px; color:var(--accent-blue); font-weight:bold;">${ev.total_score || 0}</span>
                            </div>
                            <div style="border-left:1px solid var(--border-color); padding-left:15px;">
                                <div style="color:var(--text-sub); font-size:11px; margin-bottom:2px;">视觉 (70%)</div>
                                <span style="font-size:18px; color:#fff; font-weight:600;">${ev.visual_score || 0}</span>
                            </div>
                            <div style="border-left:1px solid var(--border-color); padding-left:15px;">
                                <div style="color:var(--text-sub); font-size:11px; margin-bottom:2px;">音频 (30%)</div>
                                <span style="font-size:18px; color:#fff; font-weight:600;">${ev.audio_score || 0}</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="eval-section" style="margin-bottom:15px;">
                        <div style="color:var(--accent-blue); font-weight:bold; margin-bottom:8px; display:flex; align-items:center; gap:8px;">
                            <span style="background:var(--accent-blue); color:white; padding:2px 6px; border-radius:3px; font-size:10px;">P0</span>
                            P0 命中评估
                        </div>
                        <div style="padding:10px; background:rgba(62,139,255,0.05); border-radius:6px; font-size:13px; line-height:1.6;">
                            ${formatEvalText(ev.p0_evaluation)}
                        </div>
                    </div>

                    <div class="eval-section">
                        <div style="color:#1e90ff; font-weight:bold; margin-bottom:8px; display:flex; align-items:center; gap:8px;">
                            <span style="background:#1e90ff; color:white; padding:2px 6px; border-radius:3px; font-size:10px;">P1</span>
                            P1 命中评估
                        </div>
                        <div style="padding:10px; background:rgba(30,144,255,0.05); border-radius:6px; font-size:13px; line-height:1.6;">
                            ${formatEvalText(ev.p1_evaluation)}
                        </div>
                    </div>
                `;
            }

            let trafficHtml = '-';
            if (res.traffic_code_analysis) {
                const tv = res.traffic_code_analysis.visual_layer_hooks || [];
                const ta = res.traffic_code_analysis.audio_layer_hooks || [];
                let trHtml = '';
                if (tv.length) trHtml += `<div style="margin-bottom:8px;">[视觉层流量点]<ul>${tv.map(t => `<li>${t}</li>`).join('')}</ul></div>`;
                if (ta.length) trHtml += `<div>[音频层流量点]<ul>${ta.map(t => `<li>${t}</li>`).join('')}</ul></div>`;
                if (trHtml) trafficHtml = trHtml;
            }

            let taskTypeHtml = '';
            if (res.inferred_task_type) {
                taskTypeHtml = `
                <tr>
                    <th style="color: #ff9900;">任务判定</th>
                    <td style="background-color: rgba(255, 153, 0, 0.05); font-weight: bold;">${res.inferred_task_type}</td>
                </tr>
                `;
            }

            tBody.innerHTML = `
                <tr>
                    <th>解耦参考点明细</th>
                    <td>${mappingHtml || '无'}</td>
                </tr>
                <tr>
                    <th style="color: #3E8BFF;">结果评估</th>
                    <td>${evalHtml}</td>
                </tr>
                <tr>
                    <th style="color: #ff9900;">复刻流量点分析</th>
                    <td style="background-color: rgba(255, 153, 0, 0.05);">${trafficHtml}</td>
                </tr>
                ${taskTypeHtml}
                <tr>
                    <th>确定的弃用元素</th>
                    <td>${discardHtml || '-'}</td>
                </tr>
                <tr>
                    <th>最终执行指令</th>
                    <td style="color: var(--accent-green); font-weight: bold;">${res.generation_instructions || '-'}</td>
                </tr>
            `;

        }

        // 默认选中第一个
        if (viewerData.length > 0) {
            selectCase(0);
        }
    </script>
</body>

</html>
